<div class="landing-container">

  <!-- LEFT SECTION -->
  <div class="left-pane">
    <div class="brand">HRMS PRO</div>

    <h1>
      Manage Workforce with
      <span class="highlight">Clarity</span>
    </h1>

    <p>
      A unified platform for employee management, payroll, attendance,
      and performance — built for modern enterprises.
    </p>

    <button class="cta-btn">Get Started →</button>
  </div>

  <!-- RIGHT SECTION -->
  <div class="right-pane">
    <div class="login-card">

      <h2>Sign In</h2>

      <button class="login-btn" (click)="login()">
        Continue with Auth0 →
      </button>

      <div class="divider">OR</div>

      <button class="signup-btn" (click)="goToRegister()">
        Create Account
      </button>

    </div>
  </div>

</div>
